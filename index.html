<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>rochester-rental</title>
    <script type="module" crossorigin src="/assets/index-KVhM5HNU.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CIt6fmYW.css">
    <style>
      /* Mobile & Desktop Optimization - Centering and Responsiveness */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }
      
      #root {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      /* Ensure all direct children of root are centered */
      #root > * {
        width: 100%;
        max-width: 100%;
      }
      
      /* Responsive adjustments for mobile */
      @media screen and (max-width: 768px) {
        body {
          font-size: 14px;
        }
        
        #root {
          padding: 0;
        }
      }
      
      /* Tablet adjustments */
      @media screen and (min-width: 769px) and (max-width: 1024px) {
        #root {
          padding: 0;
        }
      }
      
      /* Desktop centering */
      @media screen and (min-width: 1025px) {
        #root {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Hero Section Content Override Script
      (function() {
        const goldColor = '#C9A227'; // Gold color used throughout the site
        
        function updateHeroContent() {
          // Find and update the hero title
          const heroTitle = document.querySelector('.hero-title');
          if (heroTitle) {
            heroTitle.innerHTML = 'THE RELIEF YOUR TRAVEL <span style="color: ' + goldColor + ';">DESERVES</span>';
          }
          
          // Find and update the hero subtitle/description
          const heroSubtitle = document.querySelector('.hero-subtitle');
          if (heroSubtitle) {
            heroSubtitle.textContent = 'Skip the rental car counter and avoid waiting hours for a subpar vehicle. Have your perfect vehicle delivered directly to your terminal at DTW. With 30+ vehicles and over 22,000 days booked, we make your journey smooth and worry-free.';
          }
          
          // Also check for hero-description class
          const heroDescription = document.querySelector('.hero-description');
          if (heroDescription) {
            heroDescription.textContent = 'Skip the rental car counter and avoid waiting hours for a subpar vehicle. Have your perfect vehicle delivered directly to your terminal at DTW. With 30+ vehicles and over 22,000 days booked, we make your journey smooth and worry-free.';
          }
        }
        
        // Run when DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(updateHeroContent, 100);
          });
        } else {
          setTimeout(updateHeroContent, 100);
        }
        
        // Also observe for React's dynamic rendering
        const observer = new MutationObserver(function(mutations) {
          updateHeroContent();
        });
        
        // Start observing once root is available
        function startObserving() {
          const root = document.getElementById('root');
          if (root) {
            observer.observe(root, { childList: true, subtree: true });
            // Disconnect after 5 seconds to avoid performance issues
            setTimeout(function() {
              observer.disconnect();
            }, 5000);
          }
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startObserving);
        } else {
          startObserving();
        }
      })();
    </script>
  </body>
</html>
